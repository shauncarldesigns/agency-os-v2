name = "agency-os-v2-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[routes]]
pattern = "try.shauncarldesigns.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "agency-os-v2"
database_id = "dfe72eea-8a18-47ce-a806-2cbd13139c04"

[[r2_buckets]]
binding = "RECORDINGS"
bucket_name = "agency-os-recordings"

[triggers]
crons = [
  "0 6 * * *",     # Daily 6am — refresh PageSpeed for live Tier 3 sites
  "0 7 1 * *",    # Monthly 1st 7am — finalize prior-month snapshots + exec summaries
  "0 8 * * 1",    # Weekly Monday 8am — intermediate GSC refresh
  "0 * * * *"     # Hourly — DNS poll for projects still awaiting NS delegation
]

[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[vars]
ENV = "production"

# Secrets (set via `npx wrangler secret put`):
# CLAUDE_API_KEY
# GOOGLE_PLACES_API_KEY
# GOOGLE_OAUTH_CLIENT_ID
# GOOGLE_OAUTH_CLIENT_SECRET
# GOOGLE_OAUTH_REFRESH_TOKEN
# CLOUDFLARE_API_TOKEN
# CLOUDFLARE_ACCOUNT_ID
# DASHBOARD_API_KEY
# RESEND_API_KEY
# OUTSCRAPER_API_KEY  (optional — fetches up to 50 Google reviews per lead;
#                     without it, enrichment falls back to Google's 5)
