name: Deploy Worker

# Auto-deploys the API Worker when backend code lands on main. The dashboard
# is NOT handled here — it deploys from a local machine via `npm run deploy`
# (its build needs .env.production values that aren't committed to the repo).
on:
  push:
    branches: [main]
    paths:
      - 'agency-os-backend/**'
  workflow_dispatch: {}  # allow manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agency-os-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agency-os-backend/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: agency-os-backend
          command: deploy
